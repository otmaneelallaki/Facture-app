{% extends "base.html" %}

{% block content %}

<div class="page-header">
   <div>
      <h1>Registrar un nuevo cliente</h1>
      <p>Añade los datos de contacto del cliente.</p>
   </div>
</div>

<div class="app-card">
   <form method="post">
      {% csrf_token %}
      <div class="form-row">
         <div class="form-group col-md-6">
            <label for="name"> Nombre y apellido </label>
            <input name="name" required type="text" class="form-control" id="name"
               placeholder="Nombre y apellido del cliente">
         </div>

         <div class="form-group col-md-4">
            <label for="email"> Email </label>
            <input name="email" required type="email" class="form-control" id="email" placeholder="cliente email">
         </div>

         <div class="form-group col-md-2">
            <label for="phone"> Teléfono </label>
            <input name="phone" required type="number" class="form-control" id="phone"
               placeholder="número de teléfono del cliente">
         </div>
      </div>

      <div class="form-row">
         <div class="form-group col-md-12">
            <label for="address"> Dirección </label>
            <input name="address" type="text" required class="form-control" id="address"
               placeholder="Dirección del cliente">
         </div>
      </div>

      <div class="form-row">
         <div class="form-group col-md-6">
            <label for="city"> Ciudad </label>
            <input name="city" type="text" class="form-control" id="city" placeholder="Ciudad del cliente">
         </div>
      </div>

      <button type="submit" class="btn btn-primary"> Guardar</button>

   </form>
</div>

{% endblock content %}
